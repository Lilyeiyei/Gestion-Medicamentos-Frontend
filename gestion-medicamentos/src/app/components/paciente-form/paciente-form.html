<div class="container mt-5">
  <div class="card p-4 shadow" style="max-width: 600px; margin: auto;">
    <h3 class="mb-4">Registrar Paciente</h3>

    <div *ngIf="mensaje" class="alert alert-success">{{ mensaje }}</div>
    <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

    <form [formGroup]="form" (ngSubmit)="registrar()">

      <div class="mb-3">
        <label class="form-label">Nombre completo</label>
        <input type="text" class="form-control" formControlName="nombreCompleto">
        <div *ngIf="form.get('nombreCompleto')?.invalid && form.get('nombreCompleto')?.touched" class="text-danger">
          El nombre completo es requerido.
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Documento de identidad</label>
        <input type="text" class="form-control" formControlName="documentoIdentidad">
        <div *ngIf="form.get('documentoIdentidad')?.invalid && form.get('documentoIdentidad')?.touched" class="text-danger">
          El documento es requerido y solo debe contener números.
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">EPS</label>
        <select class="form-select" formControlName="eps">
          <option value="">Seleccione su EPS</option>
          <option *ngFor="let e of epsList" [value]="e">{{ e }}</option>
        </select>
        <div *ngIf="form.get('eps')?.invalid && form.get('eps')?.touched" class="text-danger">
          La EPS es requerida.
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Correo electrónico</label>
        <input type="email" class="form-control" formControlName="email">
        <div *ngIf="form.get('email')?.invalid && form.get('email')?.touched" class="text-danger">
          El correo electrónico es requerido y debe tener un formato válido.
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-control" formControlName="contrasena">
        <div *ngIf="form.get('contrasena')?.invalid && form.get('contrasena')?.touched" class="text-danger">
          La contraseña es requerida.
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100" [disabled]="form.invalid">Registrar</button>

    </form>
  </div>
</div>
